services:
  my-awesome-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-awesome-agent
    ports:
      - "5001:5000"
    environment:
      - ALT_API_KEY=${ALT_API_KEY}

networks:
  agents-net:
    external: true         # joins the already-running Nasiko network
    name: agents-net